version: 2

models:
  - name: int_tvl_accounts
    description: "This table aggregates XLM selling liabilities from accounts to calculate TVL"
    columns:
      - name: day
        description: '{{ doc("day") }}'
        tests:
          - stellar_dbt_public.incremental_not_null:
              date_column_name: "day"
              greater_than_equal_to: "2 day"

      - name: account_id
        description: '{{ doc("account_id") }}'
        tests:
          - stellar_dbt_public.incremental_not_null:
              date_column_name: "day"
              greater_than_equal_to: "2 day"

      - name: accounts_tvl
        description: '{{ doc("accounts_tvl") }}'
        tests:
          - stellar_dbt_public.incremental_not_null:
              date_column_name: "day"
              greater_than_equal_to: "2 day"
