version: 2

models:
  - name: int_contract_asset_codes
    description: "One row per contract_id with the contract's asset_code (coalesced from stg_assets SAC asset_code, SEP-41 symbol read from contract storage, then the contract_id itself as a final fallback) plus the SEP-41 metadata fields (symbol, name, decimal, admin) read directly from contract instance storage. Single source of truth for contract-token asset_code lookups and per-contract metadata; downstream models should not need to bucket custom contract tokens under null."
    columns:
      - name: contract_id
        description: '{{ doc("contract_id") }}'
        tests:
          - not_null
          - unique

      - name: asset_code
        description: '{{ doc("asset_code") }}'
        tests:
          - not_null

      - name: asset_issuer
        description: '{{ doc("asset_issuer") }}'

      - name: asset_type
        description: '{{ doc("asset_type") }}'

      - name: symbol
        description: '{{ doc("contract_symbol") }}'

      - name: name
        description: '{{ doc("contract_name") }}'

      - name: decimal
        description: '{{ doc("decimal_precision") }}'

      - name: admin
        description: '{{ doc("contract_admin") }}'

      - name: asset_code_source
        description: "Indicates which source the asset_code came from: 'sac' = asset_code from a Stellar Asset Contract token transfer event, 'metadata' = SEP-41 symbol read from contract storage, 'contract_id' = neither was available, asset_code falls back to the contract_id itself."
        tests:
          - not_null
          - accepted_values:
              values: ["sac", "metadata", "contract_id"]
