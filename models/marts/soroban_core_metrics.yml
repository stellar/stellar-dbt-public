version: 2

models:
  - name: soroban_core_metrics
    description: '{{ doc("soroban_core_metrics") }}'
    tests:
      - recency:
          tags: [recency]
          datepart: hour
          field: closed_at
          interval: 6
          timestamp_val: '{{ var("batch_end_date") }}'
          config:
            enabled: '{{ target.name == "ci" or var("is_recency_airflow_task") == "true" }}'
            severity: '{{ "error" if target.name == "prod" else "warn" }}'
          meta:
            description: "Monitors the freshness of your table over time, as the expected time between data updates."
      - incremental_unique_combination_of_columns:
          combination_of_columns:
            - transaction_hash
            - metric_key
          date_column_name: "closed_at"
          greater_than_equal_to: "2 day"
    columns:
      # Grain
      - name: closed_at
        description: '{{ doc("soroban_core_metrics_closed_at") }}'
        tests:
          - incremental_not_null:
              date_column_name: "closed_at"
              greater_than_equal_to: "2 day"

      - name: ledger_sequence
        description: '{{ doc("soroban_core_metrics_ledger_sequence") }}'
        tests:
          - incremental_not_null:
              date_column_name: "closed_at"
              greater_than_equal_to: "2 day"

      - name: transaction_hash
        description: '{{ doc("soroban_core_metrics_transaction_hash") }}'
        tests:
          - incremental_not_null:
              date_column_name: "closed_at"
              greater_than_equal_to: "2 day"

        # Contract attribution
      - name: contract_id
        description: '{{ doc("soroban_core_metrics_contract_id") }}'

        # Metrics
      - name: metric_key
        description: '{{ doc("soroban_core_metrics_metric_key") }}'
        tests:
          - incremental_not_null:
              date_column_name: "closed_at"
              greater_than_equal_to: "2 day"

      - name: metric_value
        description: '{{ doc("soroban_core_metrics_metric_value") }}'
        tests:
          - incremental_not_null:
              date_column_name: "closed_at"
              greater_than_equal_to: "2 day"

      # Metadata
      - name: airflow_start_ts
        description: '{{ doc("ledger_fee_airflow_start_ts") }}'