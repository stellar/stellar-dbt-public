version: 2

models:
  - name: ledger_fee_stats_agg
    description: '{{ doc("ledger_fee_stats") }}'
    tests:
      - recency:
          tags: [recency]
          datepart: day
          field: cast(day_agg as timestamp)
          interval: 2
          timestamp_val: '{{ var("batch_end_date") }}'
          config:
            enabled: '{{ target.name == "ci" or var("is_recency_airflow_task") == "true" }}'
            severity: '{{ "error" if target.name == "prod" else "warn" }}'
          meta:
            description: "Monitors the freshness of your table over time, as the expected time between data updates."
    columns:
      - name: day_agg
        description: '{{ doc("ledger_fee_day_agg") }}'
        tests:
          - incremental_not_null:
              date_column_name: "day_agg"
              greater_than_equal_to: "2 day"

      - name: ledger_sequence
        description: '{{ doc("ledger_fee_ledger_sequence") }}'
        tests:
          - incremental_unique:
              date_column_name: "day_agg"
              greater_than_equal_to: "2 day"
          - incremental_not_null:
              date_column_name: "day_agg"
              greater_than_equal_to: "2 day"

      # General aggregates
      - name: total_fee_charged
        description: '{{ doc("ledger_fee_total_fee_charged") }}'
        tests:
          - incremental_not_null:
              date_column_name: "day_agg"
              greater_than_equal_to: "2 day"

      - name: max_fee_charged
        description: '{{ doc("ledger_fee_max_fee_charged") }}'
        tests:
          - incremental_not_null:
              date_column_name: "day_agg"
              greater_than_equal_to: "2 day"

      - name: txn_count
        description: '{{ doc("ledger_fee_txn_count") }}'
        tests:
          - incremental_not_null:
              date_column_name: "day_agg"
              greater_than_equal_to: "2 day"

      - name: failed_txn_count
        description: '{{ doc("ledger_fee_failed_txn_count") }}'

      - name: total_effective_txn_operation_count
        description: '{{ doc("ledger_fee_total_effective_txn_operation_count") }}'
        tests:
          - incremental_not_null:
              date_column_name: "day_agg"
              greater_than_equal_to: "2 day"

      - name: total_raw_txn_operation_count
        description: '{{ doc("ledger_fee_total_raw_txn_operation_count") }}'
        tests:
          - incremental_not_null:
              date_column_name: "day_agg"
              greater_than_equal_to: "2 day"

      # Classic aggregates
      - name: classic_txn_count
        description: '{{ doc("ledger_fee_classic_txn_count") }}'

      - name: classic_failed_txn_count
        description: '{{ doc("ledger_fee_classic_failed_txn_count") }}'

      - name: classic_total_effective_operation_count
        description: '{{ doc("ledger_fee_classic_total_effective_operation_count") }}'

      - name: classic_total_raw_operation_count
        description: '{{ doc("ledger_fee_classic_total_raw_operation_count") }}'

      - name: classic_sum_fee_charged
        description: '{{ doc("ledger_fee_classic_sum_fee_charged") }}'

      - name: classic_max_fee_charged
        description: '{{ doc("ledger_fee_classic_max_fee_charged") }}'

      - name: classic_sum_max_fee
        description: '{{ doc("ledger_fee_classic_sum_max_fee") }}'

      - name: classic_max_max_fee
        description: '{{ doc("ledger_fee_classic_max_max_fee") }}'

      - name: classic_max_inclusion_fee_per_op
        description: '{{ doc("ledger_fee_classic_max_inclusion_fee_per_op") }}'

      - name: classic_min_inclusion_fee_per_op
        description: '{{ doc("ledger_fee_classic_min_inclusion_fee_per_op") }}'

      - name: classic_surge_txn_count
        description: '{{ doc("ledger_fee_classic_surge_txn_count") }}'

      - name: classic_surge_operation_count
        description: '{{ doc("ledger_fee_classic_surge_operation_count") }}'

