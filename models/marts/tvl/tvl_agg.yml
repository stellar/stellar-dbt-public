version: 2

models:
  - name: tvl_agg
    description: "This table aggregates TVL from accounts and trustlines to calculate total TVL"
    tests:
      - elementary.schema_changes:
          tags: [schema_changes]
          config:
            severity: warn
      - dbt_utils.recency:
          tags: [recency]
          datepart: day
          field: day
          interval: 2
          ignore_time_component: true
          config:
            enabled: '{{ target.name == "ci" or var("is_recency_airflow_task") == "true" }}'
            severity: '{{ "error" if target.name == "prod" else "warn" }}'
          meta:
            description: "Monitors the freshness of your table over time, as the expected time between data updates."
    columns:
      - name: day
        description: '{{ doc("day") }}'
        tests:
          - stellar_dbt_public.incremental_not_null:
              date_column_name: "day"
              greater_than_equal_to: "2 day"

      - name: asset_type
        description: '{{ doc("asset_type") }}'
        tests:
          - stellar_dbt_public.incremental_not_null:
              date_column_name: "day"
              greater_than_equal_to: "2 day"

      - name: asset_code
        description: '{{ doc("asset_code") }}'
        tests:
          - stellar_dbt_public.incremental_not_null:
              date_column_name: "day"
              greater_than_equal_to: "2 day"

      - name: asset_issuer
        description: '{{ doc("asset_issuer") }}'

      - name: accounts_tvl
        description: '{{ doc("accounts_tvl") }}'
        tests:
          - stellar_dbt_public.incremental_not_null:
              date_column_name: "day"
              greater_than_equal_to: "2 day"

      - name: trustlines_tvl
        description: '{{ doc("trustlines_tvl") }}'
        tests:
          - stellar_dbt_public.incremental_not_null:
              date_column_name: "day"
              greater_than_equal_to: "2 day"

      - name: total_tvl
        description: '{{ doc("total_tvl") }}'
        tests:
          - stellar_dbt_public.incremental_not_null:
              date_column_name: "day"
              greater_than_equal_to: "2 day"
