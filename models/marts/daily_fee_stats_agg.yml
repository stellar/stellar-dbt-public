      - name: classic_max_fee_charged
        description: '{{ doc("ledger_fee_classic_max_fee_charged") }}'

      - name: classic_sum_max_fee
        description: '{{ doc("ledger_fee_classic_sum_max_fee") }}'

      - name: classic_max_max_fee
        description: '{{ doc("ledger_fee_classic_max_max_fee") }}'

      - name: classic_max_inclusion_fee_per_op
        description: '{{ doc("ledger_fee_classic_max_inclusion_fee_per_op") }}'

      - name: classic_min_inclusion_fee_per_op
        description: '{{ doc("ledger_fee_classic_min_inclusion_fee_per_op") }}'

      # Classic: surge
