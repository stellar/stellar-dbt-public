version: 2

models:
  - name: daily_fee_stats_agg
    description: '{{ doc("daily_fee_stats") }}'
    tests:
      - dbt_utils.recency:
          tags: [recency]
          datepart: day
          field: cast(day_agg as timestamp)
          interval: 2
          config:
            enabled: '{{ target.name == "ci" or var("is_recency_airflow_task") == "true" }}'
            severity: '{{ "error" if target.name == "prod" else "warn" }}'
          meta:
            description: "Monitors the freshness of your table over time, as the expected time between data updates."
      - elementary.schema_changes:
          tags: [schema_changes]
          config:
            severity: warn
    columns:
      - name: day_agg
        description: '{{ doc("ledger_fee_day_agg") }}'
        tests:
          - incremental_unique:
              date_column_name: "day_agg"
              greater_than_equal_to: "2 day"
          - incremental_not_null:
              date_column_name: "day_agg"
              greater_than_equal_to: "2 day"

      # General
      - name: total_fee_charged
        description: '{{ doc("ledger_fee_total_fee_charged") }}'
        tests:
          - incremental_not_null:
              date_column_name: "day_agg"
              greater_than_equal_to: "2 day"

      - name: max_fee_charged
        description: '{{ doc("ledger_fee_max_fee_charged") }}'
        tests:
          - incremental_not_null:
              date_column_name: "day_agg"
              greater_than_equal_to: "2 day"

      - name: txn_count
        description: '{{ doc("ledger_fee_txn_count") }}'
        tests:
          - incremental_not_null:
              date_column_name: "day_agg"
              greater_than_equal_to: "2 day"

      - name: total_txn_operation_count
        description: '{{ doc("ledger_fee_total_txn_operation_count") }}'
        tests:
          - incremental_not_null:
              date_column_name: "day_agg"
              greater_than_equal_to: "2 day"

      - name: min_ledger_sequence
        description: '{{ doc("daily_fee_min_ledger_sequence") }}'
        tests:
          - incremental_not_null:
              date_column_name: "day_agg"
              greater_than_equal_to: "2 day"

      - name: max_ledger_sequence
        description: '{{ doc("daily_fee_max_ledger_sequence") }}'
        tests:
          - incremental_not_null:
              date_column_name: "day_agg"
              greater_than_equal_to: "2 day"

      # Classic: fee aggregates
      - name: classic_txn_count
        description: '{{ doc("ledger_fee_classic_txn_count") }}'

      - name: classic_total_operation_count
        description: '{{ doc("ledger_fee_classic_total_operation_count") }}'

      - name: classic_sum_fee_charged
